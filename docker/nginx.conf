# nginx reverse proxy — terminates TLS and forwards WebSocket to fb-server.
# Browser clients connect on port 443 (wss://); native clients connect
# directly to fb-server on port 1511 (plain TCP).

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    return 301 https://$host$request_uri;
}

# Only proxy WebSocket upgrade requests to fb-server
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name _;  # accepts any hostname; nginx uses SNI from the certificate

    ssl_certificate     /etc/ssl/fb/fullchain.pem;
    ssl_certificate_key /etc/ssl/fb/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # WebSocket proxy to fb-server (only upgrade requests)
    location / {
        if ($http_upgrade = "") {
            return 426 "This server accepts WebSocket connections only.\nConnect your Frozen Bubble client to wss://$host/\n";
        }
        proxy_pass         http://fb-server:1511;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
