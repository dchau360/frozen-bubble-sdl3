name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Linux → AppImage
  # ────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libiniparser-dev libglib2.0-dev ninja-build \
            libfuse2 file

      - name: Configure & build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel

      - name: Install into AppDir
        run: |
          DESTDIR=$PWD/AppDir cmake --install build
          # Assets live in share/ — install them under the AppDir prefix
          mkdir -p AppDir/usr/share/frozen-bubble
          cp -r share/. AppDir/usr/share/frozen-bubble/
          [ -f build/server/fb-server ] && \
            cp build/server/fb-server AppDir/usr/bin/ || true

      - name: Write .desktop and icon
        run: |
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/frozen-bubble.desktop << 'EOF'
          [Desktop Entry]
          Name=Frozen Bubble
          Comment=Frozen Bubble SDL2 port
          Exec=frozen-bubble-sdl2
          Icon=frozen-bubble
          Type=Application
          Categories=Game;ArcadeGame;
          EOF
          mkdir -p AppDir/usr/share/icons/hicolor/64x64/apps
          cp share/icons/frozen-bubble-icon-64x64.png \
             AppDir/usr/share/icons/hicolor/64x64/apps/frozen-bubble.png

      - name: Build AppImage
        run: |
          wget -q \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/frozen-bubble.desktop \
            --output appimage
          mv Frozen_Bubble*.AppImage frozen-bubble-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Linux
          path: frozen-bubble-linux-x86_64.AppImage

  # ────────────────────────────────────────────────────────────────
  # macOS → DMG
  # ────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf iniparser glib \
                       ninja dylibbundler create-dmg

      - name: Configure & build
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Create .app bundle
        run: |
          APP="dist/FrozenBubble.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"

          cp build/frozen-bubble-sdl2 "$APP/MacOS/frozen-bubble-sdl2"
          cp -r share "$APP/Resources/share"

          # Bundle shared dylibs so the app runs without Homebrew installed
          dylibbundler -od -b \
            -x "$APP/MacOS/frozen-bubble-sdl2" \
            -d "$APP/Frameworks" \
            -p @executable_path/../Frameworks/

          cat > "$APP/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Frozen Bubble</string>
            <key>CFBundleDisplayName</key><string>Frozen Bubble</string>
            <key>CFBundleIdentifier</key><string>org.frozenbubble.sdl2</string>
            <key>CFBundleVersion</key><string>2.2.0</string>
            <key>CFBundleExecutable</key><string>frozen-bubble-sdl2</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF

      - name: Ad-hoc sign app bundle
        run: |
          # Ad-hoc sign all bundled dylibs then the app itself.
          # Without signing, macOS Gatekeeper shows "damaged" for apps
          # downloaded from the internet.
          find dist/FrozenBubble.app/Contents/Frameworks -name "*.dylib" \
            -exec codesign --sign - --force {} \;
          codesign --sign - --force --deep dist/FrozenBubble.app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Frozen Bubble" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "FrozenBubble.app" 140 190 \
            --app-drop-link 400 190 \
            "frozen-bubble-macos.dmg" \
            "dist/"

      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: frozen-bubble-macos.dmg

  # ────────────────────────────────────────────────────────────────
  # Windows → NSIS installer (.exe)
  # ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (installer)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-glib2

      - name: Configure & build
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Collect binary + DLLs
        run: |
          mkdir -p pkg
          cp build/frozen-bubble-sdl2.exe pkg/
          cp build/server/fb-server.exe pkg/ 2>/dev/null || true
          cp -r share pkg/
          for dll in \
            SDL2.dll SDL2_image.dll SDL2_mixer.dll SDL2_ttf.dll \
            libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll \
            libpng16-16.dll libogg-0.dll libvorbis-0.dll libvorbisfile-3.dll \
            libfreetype-6.dll libbrotlicommon.dll libbrotlidec.dll \
            libharfbuzz-0.dll libgraphite2.dll zlib1.dll \
            libglib-2.0-0.dll libintl-8.dll libiconv-2.dll libpcre2-8-0.dll; do
              cp /mingw64/bin/$dll pkg/ 2>/dev/null || true
          done

      - name: Write NSIS script
        run: |
          cat > installer.nsi << 'EOF'
          Unicode True
          !define APPNAME "Frozen Bubble"
          !define EXENAME "frozen-bubble-sdl2.exe"
          !define VERSION "2.2.0"

          Name "${APPNAME}"
          OutFile "frozen-bubble-windows-setup.exe"
          InstallDir "$PROGRAMFILES64\FrozenBubble"
          InstallDirRegKey HKCU "Software\FrozenBubble" ""
          RequestExecutionLevel admin
          SetCompressor /SOLID lzma

          Page directory
          Page instfiles
          UninstPage instfiles

          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "pkg\*.*"
            WriteUninstaller "$INSTDIR\Uninstall.exe"
            CreateShortcut "$DESKTOP\${APPNAME}.lnk" "$INSTDIR\${EXENAME}"
            CreateDirectory "$SMPROGRAMS\${APPNAME}"
            CreateShortcut "$SMPROGRAMS\${APPNAME}\${APPNAME}.lnk" \
              "$INSTDIR\${EXENAME}"
            CreateShortcut "$SMPROGRAMS\${APPNAME}\Uninstall.lnk" \
              "$INSTDIR\Uninstall.exe"
            WriteRegStr HKCU "Software\FrozenBubble" "" "$INSTDIR"
          SectionEnd

          Section "Uninstall"
            RMDir /r "$INSTDIR"
            Delete "$DESKTOP\${APPNAME}.lnk"
            RMDir /r "$SMPROGRAMS\${APPNAME}"
            DeleteRegKey HKCU "Software\FrozenBubble"
          SectionEnd
          EOF

      - name: Install NSIS
        shell: cmd
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: frozen-bubble-windows-setup.exe

  # ────────────────────────────────────────────────────────────────
  # Android TV → APK
  # ────────────────────────────────────────────────────────────────
  build-android:
    name: Android TV (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install NDK 25
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.2.9519653"

      - name: Generate app icons from source PNG
        run: |
          sudo apt-get install -y imagemagick
          SRC="share/icons/frozen-bubble-icon-64x64.png"
          RES="android/app/src/main/res"
          for size_dir in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
            size="${size_dir%%:*}"
            dir="${size_dir##*:}"
            mkdir -p "$RES/$dir"
            convert "$SRC" -resize "${size}x${size}" "$RES/$dir/ic_launcher.png"
          done
          # TV banner: 320x180 with the icon centered on dark blue background
          mkdir -p "$RES/drawable"
          convert "$SRC" -resize 160x160 -background "#1A237E" \
            -gravity center -extent 320x180 "$RES/drawable/tv_banner.png"

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/release.keystore \
            -alias frozenbubble \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass frozenbubble \
            -keypass frozenbubble \
            -dname "CN=Frozen Bubble, OU=Game, O=FrozenBubble, L=Unknown, S=Unknown, C=US"

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          KEYSTORE_PASSWORD: frozenbubble
          KEY_ALIAS: frozenbubble
          KEY_PASSWORD: frozenbubble
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             frozen-bubble-android-tv.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Android
          path: frozen-bubble-android-tv.apk

  # ────────────────────────────────────────────────────────────────
  # WebAssembly → Itch.io
  # ────────────────────────────────────────────────────────────────
  build-wasm:
    name: WebAssembly (Itch.io)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Build WASM
        run: |
          mv CMakeLists.txt CMakeLists.txt.native
          cp CMakeListsEmscripten.txt CMakeLists.txt
          mkdir build-wasm
          emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release .
          emmake make -C build-wasm -j$(nproc)
          mv CMakeLists.txt.native CMakeLists.txt

      - name: Collect deploy files
        run: |
          mkdir dist-wasm
          # Use the Emscripten-generated HTML (has proper canvas setup + error display)
          cp build-wasm/frozen-bubble-sdl2.html dist-wasm/index.html
          cp build-wasm/frozen-bubble-sdl2.js   dist-wasm/
          cp build-wasm/frozen-bubble-sdl2.wasm dist-wasm/
          cp build-wasm/frozen-bubble-sdl2.data dist-wasm/
          cp netlify.toml dist-wasm/

      - uses: actions/upload-artifact@v4
        with:
          name: WebAssembly
          path: dist-wasm/

  # ────────────────────────────────────────────────────────────────
  # Netlify deploy — disabled (deploy limit exceeded)
  # Re-enable by removing the `if: false` line below
  # Secrets:   NETLIFY_AUTH_TOKEN
  # Variables: NETLIFY_SITE_ID
  # ────────────────────────────────────────────────────────────────
  deploy-netlify:
    name: Deploy to Netlify
    needs: build-wasm
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WebAssembly
          path: dist-wasm

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist-wasm --message="Release ${{ github.ref_name }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}

  # ────────────────────────────────────────────────────────────────
  # Itch.io deploy — only on v*.*.* tag push
  # Secrets:   BUTLER_CREDENTIALS
  # Variables: ITCHIO_USERNAME, ITCHIO_GAME
  # ────────────────────────────────────────────────────────────────
  deploy-itchio:
    name: Deploy to Itch.io
    needs: build-wasm
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WebAssembly
          path: dist-wasm

      - name: Deploy to Itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: html5
          ITCH_GAME: ${{ vars.ITCHIO_GAME }}
          ITCH_USER: ${{ vars.ITCHIO_USERNAME }}
          PACKAGE: dist-wasm
          VERSION: ${{ github.ref_name }}

  # ────────────────────────────────────────────────────────────────
  # Release — only on v*.*.* tag push
  # ────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Linux/frozen-bubble-linux-x86_64.AppImage
            macOS/frozen-bubble-macos.dmg
            Windows/frozen-bubble-windows-setup.exe
            Android/frozen-bubble-android-tv.apk
