name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Linux → AppImage
  # ────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libglib2.0-dev libfuse2 file \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev \
            libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libwayland-dev libdecor-0-dev libasound2-dev libpulse-dev \
            libjack-dev libsndio-dev libdbus-1-dev libudev-dev \
            libpipewire-0.3-dev libibus-1.0-dev \
            zlib1g-dev libpng-dev libogg-dev libvorbis-dev \
            libfreetype-dev libharfbuzz-dev

      - name: Build SDL3 from source
        run: |
          for repo_tag in \
            "SDL release-3.4.4" \
            "SDL_image release-3.4.2" \
            "SDL_mixer release-3.2.0" \
            "SDL_ttf release-3.2.2"; do
            repo="${repo_tag% *}"
            tag="${repo_tag#* }"
            git clone --depth 1 --branch "$tag" \
              "https://github.com/libsdl-org/${repo}.git" /tmp/$repo
            cmake -S /tmp/$repo -B /tmp/$repo/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL_TEST_LIBRARY=OFF \
              -DSDLIMAGE_SAMPLES=OFF \
              -DSDLMIXER_TESTS=OFF -DSDLMIXER_EXAMPLES=OFF \
              -DSDLMIXER_MP3=OFF -DSDLMIXER_FLAC=OFF \
              -DSDLMIXER_OPUS=OFF -DSDLMIXER_GME=OFF \
              -DSDLMIXER_MOD=OFF -DSDLMIXER_MIDI=OFF \
              -DSDLMIXER_VENDORED=OFF \
              -DSDLTTF_SAMPLES=OFF -DSDLTTF_VENDORED=OFF \
              -DSDLIMAGE_VENDORED=OFF \
              -DSDLIMAGE_AVIF=OFF -DSDLIMAGE_JPG=OFF \
              -DSDLIMAGE_TIF=OFF -DSDLIMAGE_WEBP=OFF
            cmake --build /tmp/$repo/build --parallel
            sudo cmake --install /tmp/$repo/build
          done
          sudo ldconfig

      - name: Configure & build game
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel

      - name: Install into AppDir
        run: |
          DESTDIR=$PWD/AppDir cmake --install build
          mkdir -p AppDir/usr/share/frozen-bubble
          cp -r share/. AppDir/usr/share/frozen-bubble/
          [ -f build/server/fb-server ] && \
            cp build/server/fb-server AppDir/usr/bin/ || true

      - name: Write .desktop and icon
        run: |
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/frozen-bubble.desktop << 'EOF'
          [Desktop Entry]
          Name=Frozen Bubble
          Comment=Frozen Bubble SDL3 port
          Exec=frozen-bubble-sdl3
          Icon=frozen-bubble
          Type=Application
          Categories=Game;ArcadeGame;
          EOF
          mkdir -p AppDir/usr/share/icons/hicolor/64x64/apps
          cp share/icons/frozen-bubble-icon-64x64.png \
             AppDir/usr/share/icons/hicolor/64x64/apps/frozen-bubble.png

      - name: Build AppImage
        run: |
          wget -q \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/frozen-bubble.desktop \
            --output appimage
          mv Frozen_Bubble*.AppImage frozen-bubble-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Linux
          path: frozen-bubble-linux-x86_64.AppImage

  # ────────────────────────────────────────────────────────────────
  # macOS → DMG
  # ────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install sdl3 sdl3_image sdl3_ttf ninja dylibbundler create-dmg \
            libogg libvorbis
          # SDL3_mixer may not be in Homebrew yet — try brew first, fall back to source
          brew install sdl3_mixer 2>/dev/null || (
            git clone --depth 1 --branch release-3.2.0 \
              https://github.com/libsdl-org/SDL_mixer.git /tmp/SDL_mixer
            cmake -S /tmp/SDL_mixer -B /tmp/SDL_mixer/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDLMIXER_VENDORED=OFF \
              -DSDLMIXER_MP3=OFF -DSDLMIXER_FLAC=OFF \
              -DSDLMIXER_OPUS=OFF -DSDLMIXER_GME=OFF \
              -DSDLMIXER_MOD=OFF -DSDLMIXER_MIDI=OFF
            cmake --build /tmp/SDL_mixer/build --parallel
            sudo cmake --install /tmp/SDL_mixer/build
          )

      - name: Configure & build
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Create .app bundle
        run: |
          APP="dist/FrozenBubble.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"

          cp build/frozen-bubble-sdl3 "$APP/MacOS/frozen-bubble-sdl3"
          cp -r share "$APP/Resources/share"

          dylibbundler -od -b \
            -x "$APP/MacOS/frozen-bubble-sdl3" \
            -d "$APP/Frameworks" \
            -p @executable_path/../Frameworks/ \
            -s /usr/local/lib \
            -s /opt/homebrew/lib

          cat > "$APP/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Frozen Bubble</string>
            <key>CFBundleDisplayName</key><string>Frozen Bubble</string>
            <key>CFBundleIdentifier</key><string>org.frozenbubble.sdl3</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>CFBundleExecutable</key><string>frozen-bubble-sdl3</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF

      - name: Ad-hoc sign app bundle
        run: |
          find dist/FrozenBubble.app/Contents/Frameworks -name "*.dylib" \
            -exec codesign --sign - --force {} \;
          codesign --sign - --force --deep dist/FrozenBubble.app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Frozen Bubble" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "FrozenBubble.app" 140 190 \
            --app-drop-link 400 190 \
            "frozen-bubble-macos.dmg" \
            "dist/"

      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: frozen-bubble-macos.dmg

  # ────────────────────────────────────────────────────────────────
  # Windows → NSIS installer (.exe)
  # ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (installer)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-glib2

      - name: Download SDL3 prebuilt MinGW libs
        run: |
          cd /tmp
          curl -fsSL -O https://github.com/libsdl-org/SDL/releases/download/release-3.4.4/SDL3-devel-3.4.4-mingw.tar.gz
          curl -fsSL -O https://github.com/libsdl-org/SDL_image/releases/download/release-3.4.2/SDL3_image-devel-3.4.2-mingw.tar.gz
          curl -fsSL -O https://github.com/libsdl-org/SDL_mixer/releases/download/release-3.2.0/SDL3_mixer-devel-3.2.0-mingw.tar.gz
          curl -fsSL -O https://github.com/libsdl-org/SDL_ttf/releases/download/release-3.2.2/SDL3_ttf-devel-3.2.2-mingw.tar.gz
          for f in SDL3*.tar.gz; do tar xf "$f"; done
          cp -r SDL3-3.4.4/x86_64-w64-mingw32/*       /mingw64/
          cp -r SDL3_image-3.4.2/x86_64-w64-mingw32/* /mingw64/
          cp -r SDL3_mixer-3.2.0/x86_64-w64-mingw32/* /mingw64/
          cp -r SDL3_ttf-3.2.2/x86_64-w64-mingw32/*   /mingw64/

      - name: Configure & build
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Collect binary + DLLs
        run: |
          mkdir -p pkg
          cp build/frozen-bubble-sdl3.exe pkg/
          cp build/server/fb-server.exe pkg/ 2>/dev/null || true
          cp -r share pkg/
          for dll in \
            SDL3.dll SDL3_image.dll SDL3_mixer.dll SDL3_ttf.dll \
            libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll \
            libpng16-16.dll libogg-0.dll libvorbis-0.dll libvorbisfile-3.dll \
            libfreetype-6.dll libbrotlicommon.dll libbrotlidec.dll \
            libharfbuzz-0.dll libgraphite2.dll zlib1.dll \
            libglib-2.0-0.dll libintl-8.dll libiconv-2.dll libpcre2-8-0.dll; do
              cp /mingw64/bin/$dll pkg/ 2>/dev/null || true
          done

      - name: Write NSIS script
        run: |
          cat > installer.nsi << 'EOF'
          Unicode True
          !define APPNAME "Frozen Bubble"
          !define EXENAME "frozen-bubble-sdl3.exe"
          !define VERSION "1.0.0"

          Name "${APPNAME}"
          OutFile "frozen-bubble-windows-setup.exe"
          InstallDir "$PROGRAMFILES64\FrozenBubble"
          InstallDirRegKey HKCU "Software\FrozenBubble" ""
          RequestExecutionLevel admin
          SetCompressor /SOLID lzma

          Page directory
          Page instfiles
          UninstPage instfiles

          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "pkg\*.*"
            WriteUninstaller "$INSTDIR\Uninstall.exe"
            CreateShortcut "$DESKTOP\${APPNAME}.lnk" "$INSTDIR\${EXENAME}"
            CreateDirectory "$SMPROGRAMS\${APPNAME}"
            CreateShortcut "$SMPROGRAMS\${APPNAME}\${APPNAME}.lnk" \
              "$INSTDIR\${EXENAME}"
            CreateShortcut "$SMPROGRAMS\${APPNAME}\Uninstall.lnk" \
              "$INSTDIR\Uninstall.exe"
            WriteRegStr HKCU "Software\FrozenBubble" "" "$INSTDIR"
          SectionEnd

          Section "Uninstall"
            RMDir /r "$INSTDIR"
            Delete "$DESKTOP\${APPNAME}.lnk"
            RMDir /r "$SMPROGRAMS\${APPNAME}"
            DeleteRegKey HKCU "Software\FrozenBubble"
          SectionEnd
          EOF

      - name: Install NSIS
        shell: cmd
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: frozen-bubble-windows-setup.exe

  # ────────────────────────────────────────────────────────────────
  # Android TV → APK
  # ────────────────────────────────────────────────────────────────
  build-android:
    name: Android TV (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install NDK 25
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.2.9519653"

      - name: Init SDL3 submodules
        run: |
          git submodule update --init android/app/jni/SDL3
          git submodule update --init android/app/jni/SDL3_image
          git submodule update --init android/app/jni/SDL3_ttf
          git submodule update --init --recursive android/app/jni/SDL3_mixer

      - name: Init SDL3_image and SDL3_ttf nested submodules
        run: |
          git submodule update --init --recursive android/app/jni/SDL3_image
          git submodule update --init --recursive android/app/jni/SDL3_ttf

      - name: Generate app icons from source PNG
        run: |
          sudo apt-get install -y imagemagick
          SRC="share/icons/frozen-bubble-icon-64x64.png"
          RES="android/app/src/main/res"
          for size_dir in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
            size="${size_dir%%:*}"
            dir="${size_dir##*:}"
            mkdir -p "$RES/$dir"
            convert "$SRC" -resize "${size}x${size}" "$RES/$dir/ic_launcher.png"
          done
          mkdir -p "$RES/drawable"
          convert "$SRC" -resize 160x160 -background "#1A237E" \
            -gravity center -extent 320x180 "$RES/drawable/tv_banner.png"

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/release.keystore \
            -alias frozenbubble \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass frozenbubble \
            -keypass frozenbubble \
            -dname "CN=Frozen Bubble, OU=Game, O=FrozenBubble, L=Unknown, S=Unknown, C=US"

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          KEYSTORE_PASSWORD: frozenbubble
          KEY_ALIAS: frozenbubble
          KEY_PASSWORD: frozenbubble
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             frozen-bubble-android-tv.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Android
          path: frozen-bubble-android-tv.apk

  # ────────────────────────────────────────────────────────────────
  # Release — only on v*.*.* tag push
  # ────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Linux/frozen-bubble-linux-x86_64.AppImage
            macOS/frozen-bubble-macos.dmg
            Windows/frozen-bubble-windows-setup.exe
            Android/frozen-bubble-android-tv.apk

  # ────────────────────────────────────────────────────────────────
  # Itch.io — deploy each platform on tag push
  # ────────────────────────────────────────────────────────────────
  deploy-itchio-linux:
    name: Deploy Linux to Itch.io
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Linux
          path: dist-linux
      - uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux
          ITCH_GAME: ${{ vars.ITCHIO_GAME }}
          ITCH_USER: ${{ vars.ITCHIO_USERNAME }}
          PACKAGE: dist-linux
          VERSION: ${{ github.ref_name }}

  deploy-itchio-macos:
    name: Deploy macOS to Itch.io
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macOS
          path: dist-macos
      - uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: osx
          ITCH_GAME: ${{ vars.ITCHIO_GAME }}
          ITCH_USER: ${{ vars.ITCHIO_USERNAME }}
          PACKAGE: dist-macos
          VERSION: ${{ github.ref_name }}

  deploy-itchio-windows:
    name: Deploy Windows to Itch.io
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Windows
          path: dist-windows
      - uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: ${{ vars.ITCHIO_GAME }}
          ITCH_USER: ${{ vars.ITCHIO_USERNAME }}
          PACKAGE: dist-windows
          VERSION: ${{ github.ref_name }}

  deploy-itchio-android:
    name: Deploy Android to Itch.io
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Android
          path: dist-android
      - uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: android
          ITCH_GAME: ${{ vars.ITCHIO_GAME }}
          ITCH_USER: ${{ vars.ITCHIO_USERNAME }}
          PACKAGE: dist-android
          VERSION: ${{ github.ref_name }}
