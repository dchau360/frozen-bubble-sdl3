<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Frozen Bubble</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    /* Scale the canvas to fit the viewport while keeping 640:480 aspect ratio.
       SDL sets the canvas pixel dimensions (640x480); CSS scales the display. */
    canvas.emscripten {
      display: block;
      /* Fit width OR height, whichever is the binding constraint */
      width: min(100vw, calc(100vh * 640 / 480));
      height: min(100vh, calc(100vw * 480 / 640));
      image-rendering: pixelated;
      cursor: default;
    }
    #status {
      color: #aaa;
      font-family: monospace;
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }
    #progress {
      width: 300px;
      height: 4px;
      background: #222;
      margin-top: 6px;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0;
      background: #4af;
      transition: width 0.15s;
    }
  </style>
</head>
<body>
  <canvas class="emscripten" id="canvas"
          oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status">Loading…</div>
  <div id="progress"><div id="progress-bar"></div></div>

  <script>
    var statusEl  = document.getElementById('status');
    var progressEl = document.getElementById('progress');
    var barEl     = document.getElementById('progress-bar');

    var Module = {
      canvas: document.getElementById('canvas'),
      print: function(t) { console.log(t); },
      printErr: function(t) { console.error(t); },
      setStatus: function(text) {
        if (text) {
          var m = text.match(/([^(]+)\((\d+)\/(\d+)\)/);
          if (m) {
            barEl.style.width = Math.round(m[2]/m[3]*100) + '%';
            statusEl.textContent = m[1].trim();
          } else {
            statusEl.textContent = text;
            barEl.style.width = text ? '0' : '100%';
          }
          statusEl.style.display = '';
          progressEl.style.display = '';
        } else {
          statusEl.style.display = 'none';
          progressEl.style.display = 'none';
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      }
    };
    Module.setStatus('Downloading…');
    window.onerror = function(msg) {
      Module.setStatus('Error: ' + msg);
      statusEl.style.color = '#f55';
    };

    // Prevent browser from acting on navigation/game keys (Backspace = back,
    // arrows = scroll, space = scroll, etc.) while the canvas is in use.
    window.addEventListener('keydown', function(e) {
      var nav = ['Backspace','Delete','ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '];
      if (nav.indexOf(e.key) !== -1) e.preventDefault();
    }, false);
  </script>
  {{{ SCRIPT }}}
</body>
</html>
