<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Frozen Bubble</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas.emscripten {
      display: block;
      position: fixed;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      image-rendering: pixelated;
      cursor: default;
    }
    #status {
      color: #aaa;
      font-family: monospace;
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }
    #progress {
      width: 300px;
      height: 4px;
      background: #222;
      margin-top: 6px;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0;
      background: #4af;
      transition: width 0.15s;
    }
  </style>
</head>
<body>
  <canvas class="emscripten" id="canvas"
          oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status">Loading…</div>
  <div id="progress"><div id="progress-bar"></div></div>

  <script>
    var statusEl  = document.getElementById('status');
    var progressEl = document.getElementById('progress');
    var barEl     = document.getElementById('progress-bar');

    function fitCanvas() {
      var canvas = document.getElementById('canvas');
      var scale = Math.min(window.innerWidth / 640, window.innerHeight / 480);
      canvas.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
    }
    window.addEventListener('resize', fitCanvas);
    // Re-apply scale whenever SDL changes the canvas width/height/style attributes
    var canvasObserver = new MutationObserver(fitCanvas);
    canvasObserver.observe(document.getElementById('canvas'), {
      attributes: true, attributeFilter: ['width', 'height', 'style']
    });

    var hasError = false;
    var Module = {
      canvas: document.getElementById('canvas'),
      print: function(t) { console.log(t); },
      printErr: function(t) { console.error(t); },
      setStatus: function(text) {
        if (hasError) return; // keep error visible
        if (text) {
          var m = text.match(/([^(]+)\((\d+)\/(\d+)\)/);
          if (m) {
            barEl.style.width = Math.round(m[2]/m[3]*100) + '%';
            statusEl.textContent = m[1].trim();
          } else {
            statusEl.textContent = text;
            barEl.style.width = text ? '0' : '100%';
          }
          statusEl.style.display = '';
          progressEl.style.display = '';
        } else {
          statusEl.style.display = 'none';
          progressEl.style.display = 'none';
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      }
    };
    Module.setStatus('Downloading…');
    window.onerror = function(msg, src, line, col, err) {
      if (!msg || msg === 'Script error.') return; // cross-origin noise, no details available
      hasError = true;
      statusEl.style.display = '';
      statusEl.style.color = '#f55';
      statusEl.textContent = 'Error: ' + msg + (src ? ' (' + src.split('/').pop() + ':' + line + ')' : '');
      progressEl.style.display = 'none';
    };

    // Prevent browser from acting on navigation/game keys (Backspace = back,
    // arrows = scroll, space = scroll, etc.) while the canvas is in use.
    // Use capture phase (true) on both window and document to intercept
    // before any other handler — including the browser's back-navigation handler.
    function preventNavKeys(e) {
      var nav = ['Backspace','Delete','ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '];
      // e.key check (modern) + keyCode fallback (Backspace=8, Delete=46, arrows=37-40, space=32)
      var code = e.keyCode || e.which;
      if (nav.indexOf(e.key) !== -1 || (code >= 32 && code <= 40) || code === 8 || code === 46) {
        e.preventDefault();
      }
    }
    window.addEventListener('keydown', preventNavKeys, true);
    document.addEventListener('keydown', preventNavKeys, true);
  </script>
  {{{ SCRIPT }}}
</body>
</html>
